<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kemono Inc.</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; cursor: none; }
  body {
    font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
    background: #fff;
    color: #111;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    overflow-x: hidden;
  }
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    padding: 2rem 3rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 100;
    background: #fff;
  }
  .logo {
    font-size: 0.9rem;
    font-weight: 600;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #111;
    opacity: 0;
    animation: fadeDown 1s cubic-bezier(0.16,1,0.3,1) forwards 0.3s;
  }
  .nav-links {
    display: flex;
    gap: 2.5rem;
    list-style: none;
    opacity: 0;
    animation: fadeDown 1s cubic-bezier(0.16,1,0.3,1) forwards 0.5s;
  }
  .nav-links a {
    font-size: 0.75rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #111;
    text-decoration: none;
    cursor: none;
    position: relative;
  }
  .nav-links a::after {
    content: '';
    position: absolute;
    bottom: -2px; left: 0;
    width: 0; height: 1px;
    background: #111;
    transition: width 0.4s cubic-bezier(0.16,1,0.3,1);
  }
  .nav-links a:hover::after { width: 100%; }

  .page {
    min-height: 100vh;
    display: none;
    flex-direction: column;
    justify-content: center;
    padding: 8rem 3rem 4rem;
    max-width: 820px;
  }
  .page.active { display: flex; }

  /* HOME */
  .tagline {
    font-size: clamp(2.2rem, 5.5vw, 3.6rem);
    font-weight: 700;
    letter-spacing: -0.03em;
    line-height: 1.15;
    margin-bottom: 3.5rem;
    overflow: hidden;
  }
  .tagline-inner {
    display: block;
    transform: translateY(110%);
    animation: slideUp 1.1s cubic-bezier(0.16,1,0.3,1) forwards 0.7s;
  }
  .line-pair {
    opacity: 0;
    transform: translateY(18px);
    transition: opacity 0.9s cubic-bezier(0.16,1,0.3,1), transform 0.9s cubic-bezier(0.16,1,0.3,1);
    font-size: 1rem;
    line-height: 2.1;
    color: #111;
  }
  .line-pair.visible { opacity: 1; transform: translateY(0); }

  /* CONTACT */
  .contact-title {
    font-size: clamp(1.8rem, 4vw, 2.8rem);
    font-weight: 700;
    letter-spacing: -0.03em;
    margin-bottom: 3rem;
    overflow: hidden;
    color: #111;
  }
  .contact-title-inner {
    display: block;
    transform: translateY(110%);
  }
  .contact-title-inner.animate {
    animation: slideUp 1.1s cubic-bezier(0.16,1,0.3,1) forwards;
  }

  .form-wrap {
    display: flex;
    flex-direction: column;
    gap: 2rem;
    max-width: 520px;
  }
  .form-field {
    opacity: 0;
    transform: translateY(14px);
    transition: opacity 0.8s cubic-bezier(0.16,1,0.3,1), transform 0.8s cubic-bezier(0.16,1,0.3,1);
  }
  .form-field.visible { opacity: 1; transform: translateY(0); }
  .form-label {
    display: block;
    font-size: 0.7rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: #111;
    margin-bottom: 0.6rem;
  }
  .form-field input,
  .form-field textarea {
    width: 100%;
    border: none;
    border-bottom: 1px solid #111;
    padding: 0.5rem 0;
    font-size: 1rem;
    font-family: inherit;
    color: #111;
    background: transparent;
    outline: none;
    cursor: none;
    transition: border-color 0.3s;
    resize: none;
  }
  .form-field input::placeholder,
  .form-field textarea::placeholder { color: #bbb; }
  .form-field textarea { min-height: 120px; line-height: 1.8; }

  .submit-btn {
    align-self: flex-start;
    padding: 0.85rem 2.5rem;
    border: 1px solid #111;
    background: transparent;
    font-size: 0.75rem;
    font-family: inherit;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: #111;
    cursor: none;
    opacity: 0;
    transform: translateY(14px);
    transition: background 0.35s cubic-bezier(0.16,1,0.3,1), color 0.35s, opacity 0.8s cubic-bezier(0.16,1,0.3,1), transform 0.8s cubic-bezier(0.16,1,0.3,1);
  }
  .submit-btn.visible { opacity: 1; transform: translateY(0); }
  .submit-btn:hover { background: #111; color: #fff; }

  .form-success {
    display: none;
    font-size: 1rem;
    color: #111;
    line-height: 2;
    opacity: 0;
    transform: translateY(10px);
    transition: opacity 0.7s ease, transform 0.7s ease;
  }
  .form-success.visible { opacity: 1; transform: translateY(0); }

  footer {
    padding: 2rem 3rem;
    font-size: 0.7rem;
    color: #111;
    letter-spacing: 0.06em;
    margin-top: auto;
  }

  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes slideUp {
    from { transform: translateY(110%); }
    to   { transform: translateY(0); }
  }

  .paw {
    position: fixed;
    pointer-events: none;
    z-index: 9999;
    width: 26px;
    height: 26px;
    opacity: 0;
    animation: pawFade 1.4s cubic-bezier(0.16,1,0.3,1) forwards;
  }
  @keyframes pawFade {
    0%   { opacity: 0; transform: scale(0.6) rotate(var(--r)); }
    15%  { opacity: 0.2; transform: scale(1) rotate(var(--r)); }
    100% { opacity: 0; transform: scale(0.95) rotate(var(--r)); }
  }
</style>
</head>
<body>

<nav>
  <span class="logo" onclick="showPage('home')">Kemono Inc.</span>
  <ul class="nav-links">
    <li><a href="#" onclick="showPage('contact');return false;">Contact</a></li>
  </ul>
</nav>

<!-- HOME -->
<div class="page active" id="page-home">
  <main>
    <h1 class="tagline"><span class="tagline-inner">切り開け、本能で。</span></h1>
    <div id="lines">
      <div class="line-pair">理屈が示す正解より、<br>本能と直感がたどり着く答えを。</div>
      <div class="line-pair">データは手段。テクノロジーは道具。<br>今を生きる人の気持ちを嗅ぎとり、</div>
      <div class="line-pair">ゴールを見つけ出す。あなたを導く。<br>クリエイティブの力で、</div>
      <div class="line-pair">新たなビジネスを切り開いていく。<br>人らしく、動物らしく、本能全開で。</div>
      <div class="line-pair">迷ったらこの世界が良くなる方へ。</div>
    </div>
  </main>
  <footer>© 2025 Kemono Inc.</footer>
</div>

<!-- CONTACT -->
<div class="page" id="page-contact">
  <main>
    <h2 class="contact-title"><span class="contact-title-inner">Contact</span></h2>
    <div class="form-wrap" id="form-wrap">
      <div class="form-field">
        <label class="form-label">件名</label>
        <input type="text" id="subject" />
      </div>
      <div class="form-field">
        <label class="form-label">内容</label>
        <textarea id="message" rows="5"></textarea>
      </div>
      <button class="submit-btn" onclick="submitForm()">Send</button>
    </div>
    <div class="form-success" id="form-success">
      ありがとうございます。<br>メッセージを受け取りました。
    </div>
  </main>
  <footer>© 2025 Kemono Inc.</footer>
</div>

<script>
  function showPage(name) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById('page-' + name).classList.add('active');
    if (name === 'contact') {
      const title = document.querySelector('.contact-title-inner');
      title.classList.remove('animate');
      void title.offsetWidth;
      title.classList.add('animate');
      document.querySelectorAll('.form-field, .submit-btn').forEach((el, i) => {
        el.classList.remove('visible');
        setTimeout(() => el.classList.add('visible'), 300 + i * 160);
      });
    }
    if (name === 'home') {
      document.querySelectorAll('#page-home .line-pair').forEach((el, i) => {
        el.classList.remove('visible');
        setTimeout(() => el.classList.add('visible'), 900 + i * 400);
      });
    }
  }

  async function submitForm() {
    const subject = document.getElementById('subject').value.trim();
    const message = document.getElementById('message').value.trim();
    if (!subject || !message) return;
    const btn = document.querySelector('.submit-btn');
    btn.textContent = 'Sending...';
    try {
      const res = await fetch('https://formspree.io/f/xbdpwkgz', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
        body: JSON.stringify({ subject, message })
      });
      if (res.ok) {
        document.getElementById('form-wrap').style.display = 'none';
        const success = document.getElementById('form-success');
        success.style.display = 'block';
        setTimeout(() => success.classList.add('visible'), 50);
      } else {
        btn.textContent = 'Send';
        alert('送信に失敗しました。もう一度お試しください。');
      }
    } catch(e) {
      btn.textContent = 'Send';
      alert('送信に失敗しました。');
    }
  }

  document.querySelectorAll('#page-home .line-pair').forEach((el, i) => {
    setTimeout(() => el.classList.add('visible'), 1100 + i * 420);
  });

  function createPaw(x, y, angle) {
    const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
    svg.setAttribute('viewBox', '0 0 40 44');
    svg.classList.add('paw');
    svg.style.left = (x - 13) + 'px';
    svg.style.top  = (y - 13) + 'px';
    svg.style.setProperty('--r', angle + 'deg');
    svg.innerHTML = `
      <ellipse cx="20" cy="28" rx="10" ry="8" fill="#111"/>
      <ellipse cx="10" cy="18" rx="4.5" ry="3.5" fill="#111"/>
      <ellipse cx="20" cy="14" rx="4.5" ry="3.5" fill="#111"/>
      <ellipse cx="30" cy="18" rx="4.5" ry="3.5" fill="#111"/>
      <ellipse cx="13" cy="9"  rx="3" ry="2.2" fill="#111"/>
      <ellipse cx="27" cy="9"  rx="3" ry="2.2" fill="#111"/>
    `;
    document.body.appendChild(svg);
    setTimeout(() => svg.remove(), 1500);
  }

  let lastPawX = 0, lastPawY = 0, stepCount = 0;
  document.addEventListener('mousemove', e => {
    const dx = e.clientX - lastPawX, dy = e.clientY - lastPawY;
    if (Math.sqrt(dx*dx + dy*dy) > 36) {
      const angle = Math.atan2(dy, dx) * 180 / Math.PI + 90;
      const perp = Math.atan2(dy, dx) + Math.PI / 2;
      const side = stepCount % 2 === 0 ? 7 : -7;
      createPaw(e.clientX + Math.cos(perp)*side, e.clientY + Math.sin(perp)*side, angle);
      lastPawX = e.clientX; lastPawY = e.clientY;
      stepCount++;
    }
  });
</script>
</body>
</html>
